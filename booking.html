<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訂位 - yELLO VIP EXCLUSIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html">yELLO VIP EXCLUSIVE</a>
  <nav class="site-nav">
    <a href="index.html">首頁</a>
    <a href="booking.html" class="active">訂位</a>
    <a href="menu.html">菜單</a>
  </nav>
</header>

<main>
  <h1>線上訂位</h1>
  <div class="notice" id="syncNotice">
    訂位送出後會同步寫入 Google 試算表；此頁面下方列表仍會保留一份在您瀏覽器裡的紀錄，方便留存。
  </div>

  <div class="panel">
    <form id="bookingForm">
      <div class="row-2">
        <div class="field">
          <label for="name">姓名 *</label>
          <input type="text" id="name" required placeholder="王小明" />
        </div>
        <div class="field">
          <label for="phone">聯絡電話 *</label>
          <input type="tel" id="phone" required placeholder="0912-345-678" />
        </div>
      </div>
      <div class="row-2">
        <div class="field">
          <label for="date">日期 *</label>
          <input type="date" id="date" required />
        </div>
        <div class="field">
          <label for="time">時間 *</label>
          <input type="time" id="time" required />
        </div>
      </div>
      <div class="field">
        <label for="people">人數 *</label>
        <input type="number" id="people" min="1" max="30" required value="2" />
      </div>
      <div class="field">
        <label>預訂餐點（選填）</label>
        <div id="preOrderFood" class="preorder-group"></div>
      </div>
      <div class="field">
        <label for="note">備註（過敏、慶生、加椅等）</label>
        <textarea id="note" placeholder="選填"></textarea>
      </div>
      <button type="submit">送出訂位</button>
    </form>
  </div>

  <div class="panel">
    <div class="toolbar">
      <h2 style="margin:0;">我的訂位紀錄</h2>
      <button type="button" class="secondary" id="clearAll">清空紀錄</button>
    </div>
    <div id="reservationList"></div>
  </div>

  <div class="toolbar" id="calLoginPanel" style="justify-content:flex-end;">
    <button type="button" class="secondary" id="calLoginBtn">開啟管理模式</button>
  </div>

  <div class="panel" id="calPanel" style="display:none;">
    <div class="toolbar">
      <h2 style="margin:0;" id="calTitle">行事曆</h2>
      <div>
        <button type="button" class="secondary" id="calPrevBtn">‹ 上個月</button>
        <button type="button" class="secondary" id="calNextBtn">下個月 ›</button>
        <button type="button" class="secondary" id="calRefreshBtn">重新整理</button>
        <button type="button" class="secondary" id="calCloseBtn">關閉管理模式</button>
      </div>
    </div>
    <div id="calGrid"></div>
    <div id="calDayDetail"></div>

    <form id="calEditForm" style="display:none;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);">
      <h3 style="margin-top:0;">編輯訂位</h3>
      <input type="hidden" id="calEditId" />
      <div class="row-2">
        <div class="field">
          <label for="calEditName">姓名</label>
          <input type="text" id="calEditName" />
        </div>
        <div class="field">
          <label for="calEditPhone">電話</label>
          <input type="tel" id="calEditPhone" />
        </div>
      </div>
      <div class="row-2">
        <div class="field">
          <label for="calEditDate">日期</label>
          <input type="date" id="calEditDate" />
        </div>
        <div class="field">
          <label for="calEditTime">時間</label>
          <input type="time" id="calEditTime" />
        </div>
      </div>
      <div class="row-2">
        <div class="field">
          <label for="calEditPeople">人數</label>
          <input type="number" id="calEditPeople" min="1" max="30" />
        </div>
        <div class="field">
          <label for="calEditStatus">狀態</label>
          <select id="calEditStatus">
            <option value="待確認">待確認</option>
            <option value="已確認">已確認</option>
            <option value="已取消">已取消</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="calEditItems">預訂餐點</label>
        <input type="text" id="calEditItems" placeholder="例如：松露野菇燉飯 x1、自製提拉米蘇 x2" />
      </div>
      <div class="field">
        <label for="calEditNote">備註</label>
        <textarea id="calEditNote"></textarea>
      </div>
      <button type="submit" id="calEditSaveBtn">儲存變更</button>
      <button type="button" class="secondary" id="calEditCancelBtn">取消</button>
    </form>
  </div>
</main>

<footer class="site-footer">© <span id="year"></span> yELLO VIP EXCLUSIVE｜此為系統雛形版本｜<a href="admin.html" style="color:inherit;">店家後台</a></footer>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

const form = document.getElementById("bookingForm");
const listEl = document.getElementById("reservationList");
const syncNotice = document.getElementById("syncNotice");

if (!isWebhookConfigured()) {
  syncNotice.textContent = "尚未設定 Google 試算表連結，目前訂位僅會存在您的瀏覽器中。請依 google-apps-script.gs 的步驟部署後，把網址貼到 config.js 的 WEBHOOK_URL。";
}

async function submitToGoogleSheet(data) {
  return submitReservationRemote(data);
}

// ---- 預訂餐點 ----
const preOrderFoodEl = document.getElementById("preOrderFood");

function renderPreOrderGroup(container, items) {
  const available = items.filter((i) => i.available !== false);
  if (available.length === 0) {
    container.innerHTML = '<p class="empty-hint" style="padding:8px 0;">目前無供應中品項</p>';
    return;
  }
  container.innerHTML = available.map((item) => `
    <div class="preorder-row" data-id="${item.id}" data-name="${escapeHtml(item.name)}">
      <span class="name">${escapeHtml(item.name)}</span>
      <input type="number" class="preorder-qty" min="0" max="99" value="0" />
    </div>
  `).join("");
}

function getPreOrderItems() {
  const items = [];
  document.querySelectorAll(".preorder-row").forEach((row) => {
    const qty = Number(row.querySelector(".preorder-qty").value) || 0;
    if (qty > 0) {
      items.push({
        id: row.dataset.id,
        name: row.dataset.name,
        qty,
      });
    }
  });
  return items;
}

function resetPreOrderInputs() {
  document.querySelectorAll(".preorder-qty").forEach((input) => (input.value = 0));
}

renderPreOrderGroup(preOrderFoodEl, Store.getFoodMenu());

function formatPreOrderItems(items) {
  if (!items || items.length === 0) return "-";
  return items.map((i) => `${i.name} x${i.qty}`).join("、");
}

function renderList() {
  const items = Store.getReservations();
  if (items.length === 0) {
    listEl.innerHTML = '<p class="empty-hint">目前尚無訂位紀錄</p>';
    return;
  }
  const rows = items.map((r) => `
    <tr>
      <td>${escapeHtml(r.name)}</td>
      <td>${escapeHtml(r.phone)}</td>
      <td>${escapeHtml(r.date)} ${escapeHtml(r.time)}</td>
      <td>${escapeHtml(r.people)} 位</td>
      <td>${escapeHtml(formatPreOrderItems(r.preOrderItems))}</td>
      <td>${escapeHtml(r.note) || "-"}</td>
      <td><span class="tag">${r.status === "pending" ? "待確認" : r.status}</span></td>
      <td><button type="button" class="secondary" data-id="${r.id}" onclick="removeItem('${r.id}')">刪除</button></td>
    </tr>
  `).join("");

  listEl.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>姓名</th><th>電話</th><th>日期時間</th><th>人數</th><th>預訂餐點</th><th>備註</th><th>狀態</th><th></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function removeItem(id) {
  Store.removeReservation(id);
  renderList();
  showToast("已刪除該筆訂位");
}
window.removeItem = removeItem;

document.getElementById("clearAll").addEventListener("click", () => {
  if (confirm("確定要清空所有訂位紀錄嗎？此動作無法復原。")) {
    writeList(STORAGE_KEYS.reservations, []);
    renderList();
    showToast("已清空所有紀錄");
  }
});

form.addEventListener("submit", async (e) => {
  e.preventDefault();
  const submitBtn = form.querySelector('button[type="submit"]');
  const preOrderItems = getPreOrderItems();
  const data = {
    id: uid("r"),
    name: document.getElementById("name").value.trim(),
    phone: document.getElementById("phone").value.trim(),
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    people: document.getElementById("people").value,
    note: document.getElementById("note").value.trim(),
    preOrderItems,
  };

  submitBtn.disabled = true;
  submitBtn.textContent = "送出中...";

  const sentToSheet = await submitToGoogleSheet(data);
  Store.addReservation(data);

  form.reset();
  document.getElementById("people").value = 2;
  resetPreOrderInputs();
  renderList();
  submitBtn.disabled = false;
  submitBtn.textContent = "送出訂位";

  if (isWebhookConfigured()) {
    showToast(sentToSheet ? "訂位已送出，並同步到 Google 試算表！" : "訂位已存本機，但同步試算表失敗，請確認網路或設定");
  } else {
    showToast("訂位已送出（尚未同步試算表，請先完成設定）");
  }
});

renderList();
(async () => {
  const remote = await fetchRemoteMenu();
  if (remote) {
    renderPreOrderGroup(preOrderFoodEl, remote.food);
  }
})();

/* ===================================================================
   管理模式：登入後顯示行事曆，把當月訂位簡要標註在對應日期上，
   點選日期可看當天完整明細。密碼與菜單管理、admin.html 共用。
   =================================================================== */

const calLoginPanel = document.getElementById("calLoginPanel");
const calPanel = document.getElementById("calPanel");
const calLoginBtn = document.getElementById("calLoginBtn");
const calPrevBtn = document.getElementById("calPrevBtn");
const calNextBtn = document.getElementById("calNextBtn");
const calRefreshBtn = document.getElementById("calRefreshBtn");
const calCloseBtn = document.getElementById("calCloseBtn");
const calGrid = document.getElementById("calGrid");
const calTitle = document.getElementById("calTitle");
const calDayDetail = document.getElementById("calDayDetail");
const calEditForm = document.getElementById("calEditForm");
const calEditCancelBtn = document.getElementById("calEditCancelBtn");

let calPassword = "";
let calReservations = [];
let calViewDate = new Date();
let calSelectedDate = null;

if (!isWebhookConfigured()) {
  calLoginBtn.disabled = true;
}

function pad2(n) {
  return String(n).padStart(2, "0");
}

async function calLogin() {
  const pw = prompt("請輸入管理密碼：");
  if (pw === null) return; // 取消
  const trimmed = pw.trim();
  if (!trimmed) {
    showToast("請輸入密碼");
    return;
  }
  calPassword = trimmed;
  calLoginBtn.disabled = true;
  calLoginBtn.textContent = "登入中...";
  const result = await fetchRemoteReservations(calPassword);
  calLoginBtn.disabled = false;
  calLoginBtn.textContent = "開啟管理模式";
  if (!result.ok) {
    showToast(result.reason === "密碼錯誤" ? "密碼錯誤，請重新輸入" : "讀取失敗，請稍後再試");
    return;
  }
  calReservations = result.reservations;
  calLoginPanel.style.display = "none";
  calPanel.style.display = "block";
  calViewDate = new Date();
  calSelectedDate = null;
  renderCalendar();
}

calLoginBtn.addEventListener("click", calLogin);

calCloseBtn.addEventListener("click", () => {
  calPanel.style.display = "none";
  calLoginPanel.style.display = "flex";
  calPassword = "";
});

async function calRefresh() {
  const result = await fetchRemoteReservations(calPassword);
  if (result.ok) {
    calReservations = result.reservations;
    renderCalendar();
    showToast("行事曆已重新整理");
  } else {
    showToast("讀取失敗，請稍後再試");
  }
}
calRefreshBtn.addEventListener("click", calRefresh);

function renderCalendar() {
  const year = calViewDate.getFullYear();
  const month = calViewDate.getMonth(); // 0-based
  calTitle.textContent = `${year} 年 ${month + 1} 月`;

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  const byDate = {};
  calReservations.forEach((r) => {
    if (!r.date) return;
    if (!byDate[r.date]) byDate[r.date] = [];
    byDate[r.date].push(r);
  });

  const weekdayLabels = ["日", "一", "二", "三", "四", "五", "六"];
  let html = '<div class="calendar-weekdays">' + weekdayLabels.map((w) => `<div>${w}</div>`).join("") + "</div>";
  html += '<div class="calendar-grid">';

  for (let i = 0; i < startWeekday; i++) {
    html += '<div class="calendar-cell empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${pad2(month + 1)}-${pad2(d)}`;
    const dayReservations = byDate[dateStr] || [];
    const isToday = dateStr === todayStr;
    const isSelected = dateStr === calSelectedDate;
    const preview = dayReservations.slice(0, 2).map((r) => `<div class="cal-entry">${escapeHtml(r.time || "")} ${escapeHtml(r.name)}</div>`).join("");
    const more = dayReservations.length > 2 ? `<div class="cal-more">+${dayReservations.length - 2} 筆</div>` : "";
    html += `
      <div class="calendar-cell ${isToday ? "today" : ""} ${dayReservations.length ? "has-reservation" : ""} ${isSelected ? "selected" : ""}" data-date="${dateStr}">
        <div class="cal-daynum">${d}</div>
        ${preview}
        ${more}
      </div>
    `;
  }

  html += "</div>";
  calGrid.innerHTML = html;

  calGrid.querySelectorAll(".calendar-cell[data-date]").forEach((cell) => {
    cell.addEventListener("click", () => {
      calSelectedDate = cell.dataset.date;
      renderCalendar();
      renderDayDetail();
    });
  });

  if (calSelectedDate) renderDayDetail();
  else calDayDetail.innerHTML = "";
}

function renderDayDetail() {
  const dayReservations = calReservations.filter((r) => r.date === calSelectedDate);
  if (dayReservations.length === 0) {
    calDayDetail.innerHTML = `<p class="empty-hint">${escapeHtml(calSelectedDate)} 沒有訂位</p>`;
    return;
  }
  const rows = dayReservations.map((r) => `
    <tr>
      <td>${escapeHtml(r.time)}</td>
      <td>${escapeHtml(r.name)}</td>
      <td>${escapeHtml(r.phone)}</td>
      <td>${escapeHtml(r.people)} 位</td>
      <td>${escapeHtml(r.items) || "-"}</td>
      <td>${escapeHtml(r.note) || "-"}</td>
      <td><span class="tag">${escapeHtml(r.status)}</span></td>
      <td><button type="button" class="secondary" onclick="openCalEdit('${r.id}')">編輯</button></td>
    </tr>
  `).join("");
  calDayDetail.innerHTML = `
    <h3 style="margin-top:20px;">${escapeHtml(calSelectedDate)} 訂位明細</h3>
    <table>
      <thead>
        <tr><th>時間</th><th>姓名</th><th>電話</th><th>人數</th><th>預訂餐點</th><th>備註</th><th>狀態</th><th></th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function openCalEdit(id) {
  const r = calReservations.find((x) => x.id === id);
  if (!r) return;
  document.getElementById("calEditId").value = r.id;
  document.getElementById("calEditName").value = r.name || "";
  document.getElementById("calEditPhone").value = r.phone || "";
  document.getElementById("calEditDate").value = r.date || "";
  document.getElementById("calEditTime").value = r.time || "";
  document.getElementById("calEditPeople").value = r.people || "";
  document.getElementById("calEditStatus").value = r.status || "待確認";
  document.getElementById("calEditItems").value = r.items || "";
  document.getElementById("calEditNote").value = r.note || "";
  calEditForm.style.display = "block";
  calEditForm.scrollIntoView({ behavior: "smooth" });
}
window.openCalEdit = openCalEdit;

function closeCalEdit() {
  calEditForm.style.display = "none";
  calEditForm.reset();
}
calEditCancelBtn.addEventListener("click", closeCalEdit);

calEditForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = document.getElementById("calEditId").value;
  const fields = {
    name: document.getElementById("calEditName").value.trim(),
    phone: document.getElementById("calEditPhone").value.trim(),
    date: document.getElementById("calEditDate").value,
    time: document.getElementById("calEditTime").value,
    people: document.getElementById("calEditPeople").value,
    status: document.getElementById("calEditStatus").value,
    items: document.getElementById("calEditItems").value.trim(),
    note: document.getElementById("calEditNote").value.trim(),
  };
  const saveBtn = document.getElementById("calEditSaveBtn");
  saveBtn.disabled = true;
  saveBtn.textContent = "儲存中...";
  const result = await updateRemoteReservation(id, fields, calPassword);
  saveBtn.disabled = false;
  saveBtn.textContent = "儲存變更";
  if (!result.ok) {
    showToast(result.reason === "密碼錯誤" ? "密碼錯誤，請重新登入管理模式" : "儲存失敗，請稍後再試");
    return;
  }
  calReservations = calReservations.map((r) => (r.id === id ? { ...r, ...fields } : r));
  closeCalEdit();
  renderCalendar();
  showToast("已更新訂位");
});

calPrevBtn.addEventListener("click", () => {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() - 1, 1);
  calSelectedDate = null;
  renderCalendar();
});
calNextBtn.addEventListener("click", () => {
  calViewDate = new Date(calViewDate.getFullYear(), calViewDate.getMonth() + 1, 1);
  calSelectedDate = null;
  renderCalendar();
});
</script>
</body>
</html>
