<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>訂位管理 - yELLO VIP EXCLUSIVE</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Yuji+Syuku&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="site-header">
  <a class="brand" href="index.html">yELLO VIP EXCLUSIVE</a>
  <nav class="site-nav">
    <a href="index.html">首頁</a>
    <a href="booking.html">訂位</a>
    <a href="menu.html">菜單</a>
  </nav>
</header>

<main>
  <h1>訂位管理（店家後台）</h1>
  <div class="notice" id="syncNotice">
    此頁面僅供店家內部使用，需輸入管理密碼才能檢視與更新訂位狀態。密碼與菜單管理共用。
  </div>

  <div class="panel" id="loginPanel">
    <div class="field">
      <label for="passwordInput">管理密碼</label>
      <input type="password" id="passwordInput" placeholder="請輸入密碼" />
    </div>
    <button type="button" id="loginBtn">登入檢視訂位</button>
  </div>

  <div class="panel" id="listPanel" style="display:none;">
    <div class="toolbar">
      <h2 style="margin:0;">所有訂位</h2>
      <button type="button" class="secondary" id="refreshBtn">重新整理</button>
    </div>
    <div id="reservationList"></div>
  </div>

  <div class="panel" id="menuPanel" style="display:none;">
    <div class="toolbar">
      <h2 style="margin:0;">菜單管理</h2>
      <button type="button" class="secondary" id="menuRefreshBtn">重新整理菜單</button>
    </div>

    <div class="tabs">
      <button type="button" class="active" data-menutab="food">🍽 食物</button>
      <button type="button" data-menutab="alcohol">🍷 酒單</button>
    </div>

    <div id="adminMenuList"></div>

    <hr style="border:none;border-top:1px solid var(--border);margin:24px 0;" />

    <h3 id="menuFormTitle">新增品項</h3>
    <form id="menuItemForm">
      <input type="hidden" id="menuEditId" />
      <div class="row-2">
        <div class="field">
          <label for="menuItemName">品名 *</label>
          <input type="text" id="menuItemName" required />
        </div>
        <div class="field">
          <label for="menuItemPrice">價格（元，客人不會看到，供未來收費使用）</label>
          <input type="number" id="menuItemPrice" min="0" />
        </div>
      </div>
      <div class="field">
        <label for="menuItemDesc">說明</label>
        <input type="text" id="menuItemDesc" placeholder="食材、口味描述等" />
      </div>
      <div class="field" id="menuCategoryFieldWrap" style="display:none;">
        <label for="menuItemCategory">分類</label>
        <select id="menuItemCategory"></select>
      </div>
      <div class="field">
        <label><input type="checkbox" id="menuItemAvailable" checked style="width:auto;display:inline-block;margin-right:6px;" />目前供應中</label>
      </div>
      <button type="submit" id="menuSubmitBtn">新增品項</button>
      <button type="button" class="secondary" id="menuCancelEdit">取消</button>
    </form>
  </div>
</main>

<footer class="site-footer">© <span id="year"></span> yELLO VIP EXCLUSIVE｜此為系統雛形版本</footer>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
document.getElementById("year").textContent = new Date().getFullYear();

const syncNotice = document.getElementById("syncNotice");
const loginPanel = document.getElementById("loginPanel");
const listPanel = document.getElementById("listPanel");
const passwordInput = document.getElementById("passwordInput");
const loginBtn = document.getElementById("loginBtn");
const refreshBtn = document.getElementById("refreshBtn");
const listEl = document.getElementById("reservationList");

const menuPanel = document.getElementById("menuPanel");
const menuRefreshBtn = document.getElementById("menuRefreshBtn");
const adminMenuListEl = document.getElementById("adminMenuList");
const menuTabs = document.querySelectorAll("[data-menutab]");
const menuItemForm = document.getElementById("menuItemForm");
const menuCategoryFieldWrap = document.getElementById("menuCategoryFieldWrap");
const menuCategorySelect = document.getElementById("menuItemCategory");

menuCategorySelect.innerHTML = ALCOHOL_CATEGORIES.map((c) => `<option value="${c}">${c}</option>`).join("");

let adminPassword = "";
let menuTab = "food";
let currentFoodMenu = [];
let currentAlcoholMenu = [];

if (!isWebhookConfigured()) {
  syncNotice.textContent = "尚未設定共用試算表連結，無法讀取訂位。請先完成 config.js 的 WEBHOOK_URL 設定。";
  loginBtn.disabled = true;
}

const STATUS_OPTIONS = ["待確認", "已確認", "已取消"];

function formatDateTime(iso) {
  if (!iso) return "-";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleString("zh-TW", { hour12: false });
}

async function loadReservations() {
  listEl.innerHTML = '<p class="empty-hint">載入中...</p>';
  const result = await fetchRemoteReservations(adminPassword);
  if (!result.ok) {
    if (result.reason === "密碼錯誤") {
      showToast("密碼錯誤，請重新輸入");
      listPanel.style.display = "none";
      loginPanel.style.display = "block";
    } else {
      listEl.innerHTML = '<p class="empty-hint">讀取失敗，請按 F12 開啟開發者工具的 Console 分頁檢視詳細錯誤，或稍後再按「重新整理」</p>';
    }
    return false;
  }
  renderReservations(result.reservations);
  return true;
}

function renderReservations(reservations) {
  if (reservations.length === 0) {
    listEl.innerHTML = '<p class="empty-hint">目前尚無訂位</p>';
    return;
  }

  const rows = reservations.map((r) => `
    <tr data-id="${escapeHtml(r.id)}">
      <td>${escapeHtml(formatDateTime(r.submittedAt))}</td>
      <td>${escapeHtml(r.name)}</td>
      <td>${escapeHtml(r.phone)}</td>
      <td>${escapeHtml(r.email) || "-"}</td>
      <td>${escapeHtml(r.date)} ${escapeHtml(r.time)}</td>
      <td>${escapeHtml(r.people)} 位</td>
      <td>${escapeHtml(r.items) || "-"}</td>
      <td>${escapeHtml(r.note) || "-"}</td>
      <td>
        <select class="statusSelect">
          ${STATUS_OPTIONS.map((s) => `<option value="${s}" ${s === r.status ? "selected" : ""}>${s}</option>`).join("")}
        </select>
      </td>
    </tr>
  `).join("");

  listEl.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>送出時間</th><th>姓名</th><th>電話</th><th>Email</th><th>日期時間</th><th>人數</th><th>預訂餐點</th><th>備註</th><th>狀態</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;

  listEl.querySelectorAll(".statusSelect").forEach((select) => {
    select.addEventListener("change", async (e) => {
      const row = e.target.closest("tr");
      const id = row.dataset.id;
      const status = e.target.value;
      e.target.disabled = true;
      const result = await updateRemoteReservationStatus(id, status, adminPassword);
      e.target.disabled = false;
      if (result.ok) {
        showToast("已更新為「" + status + "」");
      } else {
        showToast("更新失敗：" + (result.reason === "密碼錯誤" ? "密碼錯誤" : "請確認網路連線"));
      }
    });
  });
}

loginBtn.addEventListener("click", async () => {
  const pw = passwordInput.value.trim();
  if (!pw) {
    showToast("請輸入密碼");
    return;
  }
  adminPassword = pw;
  loginBtn.disabled = true;
  loginBtn.textContent = "登入中...";
  const success = await loadReservations();
  loginBtn.disabled = false;
  loginBtn.textContent = "登入檢視訂位";
  if (success) {
    loginPanel.style.display = "none";
    listPanel.style.display = "block";
    menuPanel.style.display = "block";
    loadMenu();
  }
});

passwordInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") loginBtn.click();
});

refreshBtn.addEventListener("click", loadReservations);

/* ===================================================================
   菜單管理：沿用登入時輸入的管理密碼，新增/編輯/刪除後同步回共用試算表。
   =================================================================== */

function getCurrentAdminMenu() {
  return menuTab === "food" ? currentFoodMenu : currentAlcoholMenu;
}
function setCurrentAdminMenu(list) {
  if (menuTab === "food") currentFoodMenu = list;
  else currentAlcoholMenu = list;
}

async function loadMenu() {
  adminMenuListEl.innerHTML = '<p class="empty-hint">載入中...</p>';
  const remote = await fetchRemoteMenu();
  if (remote) {
    currentFoodMenu = remote.food;
    currentAlcoholMenu = remote.alcohol;
  } else {
    currentFoodMenu = Store.getFoodMenu();
    currentAlcoholMenu = Store.getAlcoholMenu();
  }
  renderAdminMenu();
}

function renderAdminMenuItem(item) {
  return `
    <div class="menu-item">
      <div class="info">
        <h3>${escapeHtml(item.name)} ${item.available === false ? '<span class="tag">暫停供應</span>' : ""}</h3>
        <p>${escapeHtml(item.desc || "")}</p>
        <div class="actions">
          <button type="button" class="secondary" onclick="editMenuItem('${item.id}')">編輯</button>
          <button type="button" class="danger" onclick="deleteMenuItem('${item.id}')">刪除</button>
        </div>
      </div>
    </div>
  `;
}

function renderAdminMenu() {
  const items = getCurrentAdminMenu();
  if (items.length === 0) {
    adminMenuListEl.innerHTML = '<p class="empty-hint">目前沒有品項</p>';
    return;
  }

  if (menuTab !== "alcohol") {
    adminMenuListEl.innerHTML = items.map(renderAdminMenuItem).join("");
    return;
  }

  // 酒單依分類分組顯示（沒有分類或分類不在清單中的，一律歸到「其它」）
  const groups = ALCOHOL_CATEGORIES.map((cat) => ({
    name: cat,
    items: items.filter((i) => {
      const itemCat = ALCOHOL_CATEGORIES.includes(i.category) ? i.category : "其它";
      return itemCat === cat;
    }),
  })).filter((g) => g.items.length > 0);

  adminMenuListEl.innerHTML = groups.map((g) => `
    <h3 style="margin:20px 0 4px;color:var(--accent-dark);">${escapeHtml(g.name)}</h3>
    ${g.items.map(renderAdminMenuItem).join("")}
  `).join("");
}

async function persistAdminMenuChange(list) {
  setCurrentAdminMenu(list);
  renderAdminMenu();
  const result = await saveRemoteMenu(menuTab, list, adminPassword);
  if (result.ok) {
    showToast("已同步到共用菜單");
  } else if (result.reason === "密碼錯誤") {
    showToast("同步失敗：管理密碼錯誤");
  } else {
    showToast("本機已更新，但同步共用菜單失敗，請確認網路連線");
  }
}

function editMenuItem(id) {
  const item = getCurrentAdminMenu().find((i) => i.id === id);
  if (!item) return;
  document.getElementById("menuEditId").value = item.id;
  document.getElementById("menuItemName").value = item.name;
  document.getElementById("menuItemPrice").value = item.price || "";
  document.getElementById("menuItemDesc").value = item.desc || "";
  document.getElementById("menuItemAvailable").checked = item.available !== false;
  if (menuTab === "alcohol") {
    menuCategorySelect.value = ALCOHOL_CATEGORIES.includes(item.category) ? item.category : "其它";
  }
  document.getElementById("menuFormTitle").textContent = "編輯品項";
  document.getElementById("menuSubmitBtn").textContent = "儲存變更";
  menuItemForm.scrollIntoView({ behavior: "smooth" });
}
window.editMenuItem = editMenuItem;

async function deleteMenuItem(id) {
  if (!confirm("確定要刪除此品項嗎？")) return;
  const list = getCurrentAdminMenu().filter((i) => i.id !== id);
  await persistAdminMenuChange(list);
}
window.deleteMenuItem = deleteMenuItem;

function resetMenuForm() {
  menuItemForm.reset();
  document.getElementById("menuEditId").value = "";
  document.getElementById("menuItemAvailable").checked = true;
  menuCategoryFieldWrap.style.display = menuTab === "alcohol" ? "block" : "none";
  document.getElementById("menuFormTitle").textContent = "新增品項";
  document.getElementById("menuSubmitBtn").textContent = "新增品項";
}

menuItemForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = document.getElementById("menuEditId").value;
  const data = {
    name: document.getElementById("menuItemName").value.trim(),
    price: Number(document.getElementById("menuItemPrice").value) || 0,
    desc: document.getElementById("menuItemDesc").value.trim(),
    available: document.getElementById("menuItemAvailable").checked,
  };
  if (menuTab === "alcohol") {
    data.category = menuCategorySelect.value;
  }
  let list = getCurrentAdminMenu();
  if (id) {
    list = list.map((i) => (i.id === id ? { ...i, ...data } : i));
  } else {
    list = [...list, { id: uid("m"), ...data }];
  }
  resetMenuForm();
  await persistAdminMenuChange(list);
});

document.getElementById("menuCancelEdit").addEventListener("click", resetMenuForm);

menuTabs.forEach((btn) => {
  btn.addEventListener("click", () => {
    menuTabs.forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");
    menuTab = btn.dataset.menutab;
    resetMenuForm();
    renderAdminMenu();
  });
});

menuRefreshBtn.addEventListener("click", loadMenu);
</script>
</body>
</html>
